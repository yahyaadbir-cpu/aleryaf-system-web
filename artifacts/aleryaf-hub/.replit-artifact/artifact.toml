kind = "web"
previewPath = "/"
title = "Aleryaf Trading Company"
version = "1.0.0"
id = "artifacts/aleryaf-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/aleryaf-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aleryaf-hub", "run", "build" ]
publicDir = "artifacts/aleryaf-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
